# CPU-specific optimization for release builds.
# For portable builds, override:
#   RUSTFLAGS="-C target-cpu=x86-64-v3" cargo build --profile release-portable
[target.'cfg(all())']
rustflags = ["-C", "target-cpu=native"]

[build]
# Keep incremental compilation off for release (already disabled by codegen-units=1)

[alias]
# Convenience commands
mcp = "run --release --bin math-calc-mcp"
mcp-dev = "run --bin math-calc-mcp"
portable = "build --profile release-portable"
