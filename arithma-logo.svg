<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#grad1)" filter="url(#shadow)"/>

  <!-- Central hexagon (representing mathematical precision) -->
  <g transform="translate(200, 200)">
    <!-- Outer hexagon -->
    <polygon points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
             fill="none" stroke="white" stroke-width="3" opacity="0.3"/>

    <!-- Inner hexagon -->
    <polygon points="0,-60 51.96,-30 51.96,30 0,60 -51.96,30 -51.96,-30"
             fill="white" opacity="0.95" filter="url(#shadow)"/>

    <!-- Mathematical symbols -->
    <!-- Sigma symbol -->
    <text x="-35" y="10" font-size="48" font-weight="bold" fill="#6366f1"
          font-family="Georgia, serif">Σ</text>

    <!-- Plus symbol -->
    <text x="25" y="0" font-size="36" font-weight="bold" fill="#8b5cf6"
          font-family="Arial, sans-serif">+</text>

    <!-- Equals symbol -->
    <text x="25" y="32" font-size="28" font-weight="bold" fill="#6366f1"
          font-family="Arial, sans-serif">=</text>
  </g>

  <!-- Orbiting circles (representing connectivity) -->
  <g transform="translate(200, 200)">
    <!-- Orbit 1 -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="white" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
    <circle cx="140" cy="0" r="6" fill="white" opacity="0.6"/>

    <!-- Orbit 2 -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="white" stroke-width="1" opacity="0.1" stroke-dasharray="3,7"/>
    <circle cx="0" cy="160" r="5" fill="white" opacity="0.4"/>

    <!-- Orbit 3 -->
    <circle cx="0" cy="0" r="175" fill="none" stroke="white" stroke-width="1" opacity="0.15" stroke-dasharray="4,6"/>
    <circle cx="-123.74" cy="-123.74" r="4" fill="white" opacity="0.5"/>
  </g>

  <!-- Top text arc -->
  <defs>
    <path id="topArc" d="M 80,200 A 120,120 0 0,1 320,200" fill="none"/>
  </defs>
  <text font-size="28" font-weight="bold" fill="white" letter-spacing="2" font-family="Arial, sans-serif">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      ARITHMA
    </textPath>
  </text>

  <!-- Bottom text -->
  <text x="200" y="360" font-size="14" fill="white" text-anchor="middle"
        font-family="Arial, sans-serif" opacity="0.9" letter-spacing="1">
    LLM CALCULATOR ENGINE
  </text>

  <!-- Accent corners -->
  <circle cx="30" cy="30" r="3" fill="white" opacity="0.6"/>
  <circle cx="370" cy="30" r="3" fill="white" opacity="0.6"/>
  <circle cx="30" cy="370" r="3" fill="white" opacity="0.6"/>
  <circle cx="370" cy="370" r="3" fill="white" opacity="0.6"/>
</svg>